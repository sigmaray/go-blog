name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "The following files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o blog .

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Validate production Compose file
        run: |
          cp .env.example .env
          docker compose -f docker-compose.yml config --quiet

      - name: Validate test Compose file
        run: docker compose -f docker-compose.test.yml config --quiet

      - name: Validate shared PostgreSQL Compose file
        run: |
          cp docs/example-postgresql-docker-compose/.env.example docs/example-postgresql-docker-compose/.env
          docker compose -f docs/example-postgresql-docker-compose/docker-compose.yml config --quiet

      - name: Smoke test production Compose stack
        run: |
          set -euo pipefail

          cleanup() {
            docker compose -f docker-compose.yml down --volumes || true
            docker compose -f docs/example-postgresql-docker-compose/docker-compose.yml down --volumes || true
            docker network rm infra || true
          }
          trap cleanup EXIT

          # Shared Postgres on the infra network (see docs/example-postgresql-docker-compose).
          cp docs/example-postgresql-docker-compose/.env.example docs/example-postgresql-docker-compose/.env
          docker compose -f docs/example-postgresql-docker-compose/docker-compose.yml up -d --wait

          cp .env.example .env
          docker compose -f docker-compose.yml up -d --build --wait
          curl -fsS "http://127.0.0.1:8083/health"

  e2e:
    runs-on: ubuntu-latest
    needs: [build, compose]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm test
