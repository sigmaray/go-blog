services:
  go-blog:
    build: .
    container_name: go-blog
    env_file: .env
    # Host publish port comes from .env GO_BLOG_HTTP_PORT; the process inside
    # the container always listens on 8083 (see Dockerfile EXPOSE / healthcheck).
    environment:
      GO_BLOG_HTTP_PORT: "8083"
    ports:
      - "${GO_BLOG_HTTP_PORT:-8083}:8083"
    restart: unless-stopped
    networks:
      - infra
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8083/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  infra:
    external: true
    name: infra
