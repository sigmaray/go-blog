---
# Build or reuse GO_BLOG_* values and write DEPLOY_DIR/.env with mode 0600.
# Prefers existing .env / shared Postgres password when playbook vars are unset.

- name: Stat existing go-blog .env
  ansible.builtin.stat:
    path: "{{ go_blog_deploy_dir }}/.env"
  register: go_blog_env_stat

- name: Read key from existing go-blog .env
  ansible.builtin.shell: |
    set -euo pipefail
    grep -E '^{{ item }}=' "{{ go_blog_deploy_dir }}/.env" | tail -1 | cut -d= -f2- || true
  args:
    executable: /bin/bash
  loop:
    - GO_BLOG_SESSION_SECRET
    - GO_BLOG_DATABASE_PASSWORD
    - GO_BLOG_HTTP_PORT
    - GIN_MODE
    - GO_BLOG_SESSION_SECURE
    - GO_BLOG_DATABASE_HOST
    - GO_BLOG_DATABASE_PORT
    - GO_BLOG_DATABASE_NAME
    - GO_BLOG_DATABASE_USER
  register: go_blog_existing_env_keys
  changed_when: false
  failed_when: false
  when: go_blog_env_stat.stat.exists | default(false)

- name: Build map of existing go-blog .env values
  ansible.builtin.set_fact:
    go_blog_existing_env: >-
      {{
        dict(
          (go_blog_existing_env_keys.results | default([]))
          | map(attribute='item')
          | zip(
            (go_blog_existing_env_keys.results | default([]))
            | map(attribute='stdout')
            | map('default', '')
            | list
          )
          | list
        )
        if (go_blog_env_stat.stat.exists | default(false))
        else {}
      }}

- name: Read POSTGRES_PASSWORD from shared Postgres .env
  ansible.builtin.shell: |
    set -euo pipefail
    if [[ -f "{{ go_blog_postgres_env_file }}" ]]; then
      grep -E '^POSTGRES_PASSWORD=' "{{ go_blog_postgres_env_file }}" | tail -1 | cut -d= -f2-
    fi
  args:
    executable: /bin/bash
  register: go_blog_postgres_password
  changed_when: false
  failed_when: false

- name: Generate GO_BLOG_SESSION_SECRET when unset
  ansible.builtin.command: openssl rand -base64 48
  register: go_blog_generated_secret
  changed_when: false
  when: >-
    (go_blog_session_secret | default('') | length == 0)
    and (go_blog_existing_env.GO_BLOG_SESSION_SECRET | default('') | length == 0)

- name: Resolve effective go-blog env values
  ansible.builtin.set_fact:
    go_blog_session_secret_effective: >-
      {{
        go_blog_session_secret
        if (go_blog_session_secret | default('') | length > 0)
        else (
          go_blog_existing_env.GO_BLOG_SESSION_SECRET
          if (go_blog_existing_env.GO_BLOG_SESSION_SECRET | default('') | length > 0)
          else go_blog_generated_secret.stdout
        )
      }}
    go_blog_database_password_effective: >-
      {{
        go_blog_database_password
        if (go_blog_database_password | default('') | length > 0)
        else (
          go_blog_existing_env.GO_BLOG_DATABASE_PASSWORD
          if (go_blog_existing_env.GO_BLOG_DATABASE_PASSWORD | default('') | length > 0)
          else (go_blog_postgres_password.stdout | default(''))
        )
      }}
    go_blog_http_port_effective: >-
      {{
        go_blog_existing_env.GO_BLOG_HTTP_PORT
        if (
          (go_blog_existing_env.GO_BLOG_HTTP_PORT | default('') | length > 0)
          and (go_blog_http_port | string == '8083')
        )
        else (go_blog_http_port | string)
      }}
    gin_mode_effective: >-
      {{
        go_blog_existing_env.GIN_MODE
        if (
          (go_blog_existing_env.GIN_MODE | default('') | length > 0)
          and (gin_mode | string == 'release')
        )
        else gin_mode
      }}
    go_blog_session_secure_effective: >-
      {{
        go_blog_existing_env.GO_BLOG_SESSION_SECURE
        if (
          (go_blog_existing_env.GO_BLOG_SESSION_SECURE | default('') | length > 0)
          and (go_blog_session_secure | string == '0')
        )
        else (go_blog_session_secure | string)
      }}
    go_blog_database_host_effective: >-
      {{
        go_blog_existing_env.GO_BLOG_DATABASE_HOST
        if (
          (go_blog_existing_env.GO_BLOG_DATABASE_HOST | default('') | length > 0)
          and (go_blog_database_host | string == 'postgresql')
        )
        else go_blog_database_host
      }}
    go_blog_database_port_effective: >-
      {{
        go_blog_existing_env.GO_BLOG_DATABASE_PORT
        if (
          (go_blog_existing_env.GO_BLOG_DATABASE_PORT | default('') | length > 0)
          and (go_blog_database_port | string == '5432')
        )
        else (go_blog_database_port | string)
      }}
    go_blog_database_name_effective: >-
      {{
        go_blog_existing_env.GO_BLOG_DATABASE_NAME
        if (
          (go_blog_existing_env.GO_BLOG_DATABASE_NAME | default('') | length > 0)
          and (go_blog_database_name | string == 'goblog')
        )
        else go_blog_database_name
      }}
    go_blog_database_user_effective: >-
      {{
        go_blog_existing_env.GO_BLOG_DATABASE_USER
        if (
          (go_blog_existing_env.GO_BLOG_DATABASE_USER | default('') | length > 0)
          and (go_blog_database_user | string == 'postgres')
        )
        else go_blog_database_user
      }}

- name: Fail when database password cannot be resolved
  ansible.builtin.fail:
    msg: >-
      GO_BLOG_DATABASE_PASSWORD is unset; set go_blog_database_password or deploy Postgres
      so {{ go_blog_postgres_env_file }} exists
  when: go_blog_database_password_effective | length == 0

- name: Fail when session secret is too short
  ansible.builtin.fail:
    msg: GO_BLOG_SESSION_SECRET must be at least 32 characters
  when: go_blog_session_secret_effective | length < 32

- name: Write go-blog deploy .env
  ansible.builtin.template:
    src: env.j2
    dest: "{{ go_blog_deploy_dir }}/.env"
    mode: "0600"
