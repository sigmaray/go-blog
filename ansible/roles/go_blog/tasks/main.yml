---
# Deploy go-blog compose stack onto the VPS.
# Equivalent to scripts/setup-vps.sh (requires shared PostgreSQL on network infra).

- name: Ensure Docker network infra exists
  ansible.builtin.include_tasks: network.yml

- name: Deploy go-blog project tree
  ansible.builtin.include_tasks: deploy.yml

- name: Ensure go-blog deploy .env exists
  ansible.builtin.include_tasks: env.yml

- name: Start go-blog compose stack, wait for health, migrate
  ansible.builtin.include_tasks: compose.yml
