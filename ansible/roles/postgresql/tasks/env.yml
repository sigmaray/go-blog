---
# Build or reuse POSTGRES_* values and write DEPLOY_DIR/.env with mode 0600.
# Prefers existing .env values when playbook vars still hold defaults.

- name: Stat existing PostgreSQL .env
  ansible.builtin.stat:
    path: "{{ postgresql_deploy_dir }}/.env"
  register: postgresql_env_stat

- name: Read existing POSTGRES_PASSWORD from .env
  ansible.builtin.shell: |
    set -euo pipefail
    grep -E '^POSTGRES_PASSWORD=' "{{ postgresql_deploy_dir }}/.env" | tail -1 | cut -d= -f2-
  args:
    executable: /bin/bash
  register: postgresql_existing_password
  changed_when: false
  failed_when: false
  when: postgresql_env_stat.stat.exists | default(false)

- name: Read existing POSTGRES_USER from .env
  ansible.builtin.shell: |
    set -euo pipefail
    grep -E '^POSTGRES_USER=' "{{ postgresql_deploy_dir }}/.env" | tail -1 | cut -d= -f2-
  args:
    executable: /bin/bash
  register: postgresql_existing_user
  changed_when: false
  failed_when: false
  when: postgresql_env_stat.stat.exists | default(false)

- name: Read existing POSTGRES_PORT from .env
  ansible.builtin.shell: |
    set -euo pipefail
    grep -E '^POSTGRES_PORT=' "{{ postgresql_deploy_dir }}/.env" | tail -1 | cut -d= -f2-
  args:
    executable: /bin/bash
  register: postgresql_existing_port
  changed_when: false
  failed_when: false
  when: postgresql_env_stat.stat.exists | default(false)

- name: Generate POSTGRES_PASSWORD when unset
  ansible.builtin.command: openssl rand -base64 24
  register: postgresql_generated_password
  changed_when: false
  when: >-
    (postgresql_password | default('') | length == 0)
    and (postgresql_existing_password.stdout | default('') | length == 0)

- name: Resolve effective PostgreSQL env values
  ansible.builtin.set_fact:
    postgresql_password_effective: >-
      {{
        postgresql_password
        if (postgresql_password | default('') | length > 0)
        else (
          postgresql_existing_password.stdout
          if (postgresql_existing_password.stdout | default('') | length > 0)
          else postgresql_generated_password.stdout
        )
      }}
    postgresql_user_effective: >-
      {{
        postgresql_existing_user.stdout
        if (
          (postgresql_existing_user.stdout | default('') | length > 0)
          and (postgresql_user | default('postgres') == 'postgres')
        )
        else postgresql_user
      }}
    postgresql_port_effective: >-
      {{
        postgresql_existing_port.stdout
        if (
          (postgresql_existing_port.stdout | default('') | length > 0)
          and (postgresql_port | string == '5432')
        )
        else (postgresql_port | string)
      }}

- name: Write PostgreSQL deploy .env
  ansible.builtin.template:
    src: env.j2
    dest: "{{ postgresql_deploy_dir }}/.env"
    mode: "0600"
