---
# Molecule inventory: Incus instance named molecule-go-blog (created by create.yml).
all:
  children:
    vps:
      hosts:
        molecule-go-blog:
          ansible_connection: community.general.incus
          ansible_user: root
          ansible_python_interpreter: /usr/bin/python3
      vars:
        # Host path mounted into the instance at /opt/src (see create.yml).
        molecule_src_mount: /opt/src
        # Shared group_vars normally loaded from inventory/group_vars/all.yml.
        repo_url: https://github.com/sigmaray/go-blog.git
        git_ref: main
        setup_force: false
        postgresql_deploy_dir: /tmp/postgresql-deploy
        go_blog_deploy_dir: /tmp/go-blog-deploy
        go_blog_postgres_env_file: /tmp/postgresql-deploy/.env
        postgresql_setup_source_dir: "{{ molecule_src_mount }}/docs/example-postgresql-docker-compose"
        go_blog_setup_source_dir: "{{ molecule_src_mount }}"
        postgresql_password: molecule-test-postgres-password
        postgresql_ready_timeout_sec: 180
        go_blog_ready_timeout_sec: 300
        # Install apt packages + Docker inside the Incus instance (full bootstrap).
        setup_skip_apt: false
        setup_skip_docker_install: false
        setup_swap: false
