---
# Shared defaults for VPS bootstrap roles (mirrors SETUP_* env vars in setup-vps.sh).

# Skip apt-get when packages are already present (CI).
setup_skip_apt: false

# Skip Docker Engine install when Docker is already present (CI).
setup_skip_docker_install: false

# Rebuild and restart even when deploy tree and health checks are current.
setup_force: false

# Create and enable a swap file when swap is not configured.
setup_swap: false
setup_swap_size_mb: 2048
setup_swap_file: /swapfile

# Git clone defaults shared by roles (overridable per role).
repo_url: https://github.com/sigmaray/go-blog.git
git_ref: main
