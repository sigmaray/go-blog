{{ define "admin/edit_post.html" }}
{{ template "admin/header.html" . }}

<h2>Edit Post</h2>

{{ if .Error }}
    <div class="alert alert-danger error">{{ .Error }}</div>
{{ end }}

<form action="/admin/posts/{{ .Post.ID }}" method="POST">
    <div class="mb-3">
        <label for="title" class="form-label">Title (Optional)</label>
        <input type="text" class="form-control" id="title" name="title" value="{{ if .Title }}{{ .Title }}{{ else }}{{ .Post.Title }}{{ end }}">
    </div>

    <div class="mb-3">
        <label for="content" class="form-label">Content (Required)</label>
        <textarea class="form-control" id="content" name="content" rows="6" required>{{ if .Content }}{{ .Content }}{{ else }}{{ .Post.Content }}{{ end }}</textarea>
    </div>

    <div class="mb-3">
        <label for="tags" class="form-label">Tags (Comma separated, Optional)</label>
        <input type="text" class="form-control" id="tags" name="tags" value="{{ .Tags }}" placeholder="e.g. go, web, tutorial">
    </div>

    <button type="submit" class="btn btn-primary">Update Post</button>
    <a href="/admin/" class="btn btn-link">Cancel</a>
</form>

{{ template "admin/footer.html" . }}
{{ end }}
