{{ define "admin/create_post.html" }}
{{ template "admin/header.html" . }}

<h2>Create New Post</h2>

{{ if .Error }}
    <div class="alert alert-danger error">{{ .Error }}</div>
{{ end }}

<form action="/admin/posts" method="POST">
    <div class="mb-3">
        <label for="title" class="form-label">Title (Optional)</label>
        <input type="text" class="form-control" id="title" name="title" value="{{ .Title }}">
    </div>

    <div class="mb-3">
        <label for="content" class="form-label">Content (HTML)</label>
        <textarea class="form-control" id="content" name="content" rows="12" required>{{ .Content }}</textarea>
        <div class="form-text">Safe HTML is allowed (p, a, strong, lists, etc.). Scripts and unsafe markup are removed.</div>
    </div>

    <div class="mb-3">
        <label for="tags" class="form-label">Tags (Comma separated, Optional)</label>
        <input type="text" class="form-control" id="tags" name="tags" value="{{ .Tags }}" placeholder="e.g. go, web, tutorial">
    </div>

    <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="hidden" name="hidden" value="true" {{ if .Hidden }}checked{{ end }}>
        <label class="form-check-label" for="hidden">Hide post</label>
    </div>

    <button type="submit" class="btn btn-primary">Create Post</button>
    <a href="/admin/" class="btn btn-link">Cancel</a>
</form>

{{ template "admin/footer.html" . }}
{{ end }}
